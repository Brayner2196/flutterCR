name: flutter_residential
description: "A new Flutter project."

version: 1.1.0+36

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  toastification: ^3.0.3
  skeletonizer: ^2.1.3
  fl_chart: ^1.2.0
  flutter_launcher_icons: ^0.14.4
  carousel_slider: ^5.1.2
  flutter_staggered_animations: ^1.1.1
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  connectivity_plus: ^6.1.4
  intl: ^0.19.0
  timezone: ^0.9.4
  flutter_confetti: ^0.5.1
  flutter_bounce: ^1.1.0

  # Firebase / FCM
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/logocr.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/icono_mp.png
    - assets/icons/logo_wompi.png
    - assets/icons/icono_wompi_black.png
    - assets/icons/logo_bold.png
    - assets/icons/logocr.png
    - assets/images/

  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/GoogleSans-Italic.ttf
          style: italic
