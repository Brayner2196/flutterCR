name: flutter_residential
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  toastification: ^3.0.3
  skeletonizer: ^2.1.3
  fl_chart: ^1.2.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "lib/assets/logo/logocr.png"

flutter:
  uses-material-design: true

  fonts:
    - family: GoogleSans
      fonts:
        - asset: lib/assets/fonts/GoogleSans-Regular.ttf
        - asset: lib/assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: lib/assets/fonts/GoogleSans-Bold.ttf
          weight: 700
        - asset: lib/assets/fonts/GoogleSans-Italic.ttf
          style: italic
