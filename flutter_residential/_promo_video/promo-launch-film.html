<!-- ============= INLINE: animations.jsx (Stage / Sprite / useTime / Easing / interpolate) ============= -->
<script type="text/babel">
(function() {
  const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;
  const TimeContext = createContext({ time: 0, duration: 10, playing: false });
  const SpriteContext = createContext(null);

  const Easing = {
    linear: t => t,
    easeIn: t => t * t,
    easeOut: t => 1 - (1 - t) * (1 - t),
    easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
    expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
    overshoot: t => {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    },
    spring: t => {
      const c = (2 * Math.PI) / 3;
      return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
    },
  };

  function interpolate(t, input, output, easing) {
    const [inStart, inEnd] = input;
    const [outStart, outEnd] = output;
    if (t <= inStart) return outStart;
    if (t >= inEnd) return outEnd;
    let progress = (t - inStart) / (inEnd - inStart);
    if (easing) progress = easing(progress);
    return outStart + (outEnd - outStart) * progress;
  }

  function useTime() {
    const ctx = useContext(TimeContext);
    return ctx.time;
  }

  function Stage({ duration = 25, width = 1920, height = 1080, loop = true, children, bgColor = '#F7F1E8' }) {
    const [time, setTime] = useState(0);
    const [playing, setPlaying] = useState(true);
    const [scale, setScale] = useState(1);
    const rafRef = useRef(null);
    const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

    useEffect(() => {
      function updateScale() {
        const vw = window.innerWidth;
        const vh = window.innerHeight - 56;
        setScale(Math.min(vw / width, vh / height));
      }
      updateScale();
      window.addEventListener('resize', updateScale);
      return () => window.removeEventListener('resize', updateScale);
    }, [width, height]);

    useEffect(() => {
      if (!playing) return;
      let cancelled = false;
      let last = null;
      function tick(now) {
        if (cancelled) return;
        if (last === null) {
          last = now;
          if (typeof window !== 'undefined') window.__ready = true;
        }
        const delta = (now - last) / 1000;
        last = now;
        setTime(prev => {
          const next = prev + delta;
          if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
          return next;
        });
        rafRef.current = requestAnimationFrame(tick);
      }
      const start = () => { if (!cancelled) rafRef.current = requestAnimationFrame(tick); };
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(start);
      else start();
      return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
    }, [playing, duration, effectiveLoop]);

    if (typeof window !== 'undefined') {
      window.__seek = (t) => setTime(Math.max(0, Math.min(duration, t)));
    }

    const progress = time / duration;
    const ctx = { time, duration, playing, setPlaying, setTime };

    return (
      <TimeContext.Provider value={ctx}>
        <div style={{ position: 'fixed', inset: 0, background: '#000', display: 'flex', flexDirection: 'column' }}>
          <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
            <div style={{
              position: 'absolute', top: '50%', left: '50%',
              width, height, background: bgColor, overflow: 'hidden',
              transform: `translate(-50%, -50%) scale(${scale})`,
              transformOrigin: 'center center',
            }}>
              {children}
            </div>
          </div>
          <div style={{
            position: 'fixed', bottom: 0, left: 0, right: 0,
            background: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(10px)',
            padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 16,
            color: '#fff', fontSize: 12, zIndex: 100,
          }}>
            <button onClick={() => setPlaying(p => !p)} style={{ background: 'none', border: '1px solid rgba(255,255,255,0.3)', color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer', fontSize: 12 }}>
              {playing ? '⏸ Pausa' : '▶ Play'}
            </button>
            <button onClick={() => setTime(0)} style={{ background: 'none', border: '1px solid rgba(255,255,255,0.3)', color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer', fontSize: 12 }}>⏮ Inicio</button>
            <div style={{ fontFamily: 'ui-monospace, monospace', minWidth: 90 }}>
              {time.toFixed(2)}s / {duration.toFixed(2)}s
            </div>
            <div onMouseDown={(e) => {
              const rect = e.currentTarget.getBoundingClientRect();
              const ratio = (e.clientX - rect.left) / rect.width;
              setTime(Math.max(0, Math.min(duration, ratio * duration)));
              setPlaying(false);
            }} style={{ flex: 1, height: 4, background: 'rgba(255,255,255,0.2)', borderRadius: 2, position: 'relative', cursor: 'pointer' }}>
              <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', background: '#fff', borderRadius: 2, width: `${progress * 100}%` }} />
              <div style={{ position: 'absolute', top: '50%', width: 12, height: 12, background: '#fff', borderRadius: '50%', transform: 'translate(-50%, -50%)', left: `${progress * 100}%` }} />
            </div>
          </div>
        </div>
      </TimeContext.Provider>
    );
  }

  function Sprite({ start = 0, end, children, style }) {
    const { time } = useContext(TimeContext);
    const actualEnd = end == null ? Infinity : end;
    if (time < start || time >= actualEnd) return null;
    const duration = actualEnd - start;
    const elapsed = time - start;
    const t = duration === 0 ? 1 : Math.max(0, Math.min(1, elapsed / duration));
    return (
      <SpriteContext.Provider value={{ t, elapsed, duration, start, end: actualEnd }}>
        <div style={{ position: 'absolute', inset: 0, ...style }}>{children}</div>
      </SpriteContext.Provider>
    );
  }

  window.Animations = { Stage, Sprite, useTime, Easing, interpolate, TimeContext };
})();
</script>

<script type="text/babel">
const { Stage, Sprite, useTime, Easing, interpolate } = window.Animations;
const { IosFrame, LoginScreen, DashboardScreen, EstadoCuentaScreen, ReservasScreen, APP, FILM } = window;

// ─── Helper: typewriter ────────────────────────────────────────────────
function useTypewriter(text, startTime, charDuration) {
  const time = useTime();
  if (time < startTime) return '';
  const elapsed = time - startTime;
  const chars = Math.min(text.length, Math.floor(elapsed / charDuration));
  return text.slice(0, chars);
}

// ─── Stage del iPhone: posición/escala según fase ─────────────────────
function PhoneStage({ children }) {
  const time = useTime();

  // El iPhone aparece en t=3, persiste hasta t=21
  if (time < 2.7 || time > 21.5) return null;

  // Entrada desde abajo (t=3.0 -> 3.7)
  const enterProgress = interpolate(time, [2.7, 3.7], [0, 1], Easing.expoOut);
  const yOffset = interpolate(enterProgress, [0, 1], [180, 0]);
  const opacity = interpolate(time, [2.7, 3.4], [0, 1], Easing.easeOut);

  // Salida en t=21 -> 22 (slide derecha + fade)
  const exitProgress = interpolate(time, [21.0, 22.0], [0, 1], Easing.expoOut);
  const xOffset = interpolate(exitProgress, [0, 1], [0, 220]);
  const exitOpacity = interpolate(time, [21.0, 21.8], [1, 0], Easing.easeIn);

  // Respiración sutil mientras está en pantalla (t=8-20)
  const breath = Math.sin((time - 8) * 0.5) * 6;
  const breathScale = 1 + Math.sin((time - 8) * 0.4) * 0.008;

  // Escala global: en hook está pequeño, normal en dashboard, más grande en close
  let baseScale = 1;
  if (time < 7) baseScale = 0.96;
  else if (time > 19.5 && time < 21) baseScale = interpolate(time, [19.5, 21], [1.0, 0.92], Easing.easeOut);

  return (
    <div style={{
      position: 'absolute',
      left: '60%',
      top: '50%',
      transform: `translate(-50%, calc(-50% + ${yOffset + breath}px)) translateX(${xOffset}px) scale(${baseScale * breathScale})`,
      opacity: Math.min(opacity, exitOpacity),
      transformOrigin: 'center center',
    }}>
      {children}
    </div>
  );
}

// ─── ACT I: Hook (0-3s) ───────────────────────────────────────────────
function HookScene() {
  const time = useTime();
  // Slide-up + fade in
  const op1 = interpolate(time, [0.4, 1.2], [0, 1], Easing.expoOut);
  const y1 = interpolate(time, [0.4, 1.2], [40, 0], Easing.expoOut);
  const op2 = interpolate(time, [1.1, 2.0], [0, 1], Easing.expoOut);
  const y2 = interpolate(time, [1.1, 2.0], [40, 0], Easing.expoOut);

  // Drift up cuando aparece iPhone
  const driftY = interpolate(time, [2.5, 4.5], [0, -180], Easing.expoOut);
  const driftScale = interpolate(time, [2.5, 4.5], [1, 0.55], Easing.expoOut);
  const driftX = interpolate(time, [2.5, 4.5], [0, -320], Easing.expoOut);

  return (
    <div style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column',
      justifyContent: 'center', paddingLeft: 180,
    }}>
      <div style={{
        fontFamily: 'Newsreader, serif',
        fontSize: 96, fontWeight: 500, color: FILM.ink,
        lineHeight: 1.1, letterSpacing: '-0.02em',
        transform: `translate(${driftX}px, ${driftY}px) scale(${driftScale})`,
        transformOrigin: 'top left',
      }}>
        <div style={{ opacity: op1, transform: `translateY(${y1}px)` }}>
          Tu conjunto.
        </div>
        <div style={{
          opacity: op2,
          transform: `translateY(${y2}px)`,
          fontStyle: 'italic',
          color: FILM.terracotta,
        }}>
          En tu mano.
        </div>
      </div>
    </div>
  );
}

// ─── ACT II: Login (3-7s) — typewriter dentro del iPhone ─────────────
function LoginScene() {
  const time = useTime();
  const emailText = useTypewriter('ana@torres.co', 3.6, 0.13);
  const passwordChars = Math.min(8, Math.max(0, Math.floor((time - 5.2) / 0.16)));
  const isLoading = time > 6.95 && time < 7.05;
  const buttonPressed = time > 6.75 && time < 7.0;

  return (
    <LoginScreen
      emailTyped={time >= 3.5 ? emailText : undefined}
      passwordDots={passwordChars}
      isLoading={isLoading}
      buttonPressed={buttonPressed}
    />
  );
}

// ─── ACT III: Dashboard (7-12s) ──────────────────────────────────────
function DashboardScene() {
  const time = useTime();
  // Cards aparecen una a una con stagger
  // Card 0 en t=8.5, +100ms cada una
  const cardsRevealed = Math.min(5, Math.max(0, Math.floor((time - 8.5) / 0.45) + 1));
  const hoverIndex = time > 11.5 && time < 12.3 ? 0 : -1;
  return <DashboardScreen cardsRevealed={cardsRevealed} hoverIndex={hoverIndex} />;
}

// ─── ACT IV-a: Estado de cuenta + pago (12-17s) ──────────────────────
function PagosScene() {
  const time = useTime();
  // Sheet sube en t=14.0 -> 14.5
  const sheetProgress = interpolate(time, [14.0, 14.5], [0, 1], Easing.expoOut);
  const showSheet = time > 14.0;
  // Success en t=14.8
  const showSuccess = time > 14.8;
  return (
    <EstadoCuentaScreen
      showSheet={showSheet}
      sheetProgress={sheetProgress}
      showSuccess={showSuccess}
    />
  );
}

// ─── ACT IV-b: Reservas (17-21s) ─────────────────────────────────────
function ReservasScene() {
  const time = useTime();
  const selectedDay = time > 18.7 ? 15 : -1;
  const showConfirm = time > 19.1;
  return <ReservasScreen selectedDay={selectedDay} showConfirm={showConfirm} />;
}

// ─── Side copy (a la izquierda del iPhone) ───────────────────────────
function SideCopy({ start, end, primary, secondary }) {
  const time = useTime();
  if (time < start - 0.3 || time > end + 0.3) return null;
  const op = Math.min(
    interpolate(time, [start - 0.3, start + 0.5], [0, 1], Easing.expoOut),
    interpolate(time, [end - 0.3, end + 0.3], [1, 0], Easing.easeIn)
  );
  const y = interpolate(time, [start - 0.3, start + 0.5], [20, 0], Easing.expoOut);

  return (
    <div style={{
      position: 'absolute', left: 140, top: '50%',
      transform: `translateY(calc(-50% + ${y}px))`,
      opacity: op, maxWidth: 480,
    }}>
      <div style={{
        fontFamily: 'Newsreader, serif',
        fontSize: 56, fontWeight: 500, color: FILM.ink,
        lineHeight: 1.1, letterSpacing: '-0.015em',
      }}>{primary}</div>
      {secondary && (
        <div style={{
          fontFamily: 'Newsreader, serif',
          fontSize: 24, fontWeight: 400, fontStyle: 'italic',
          color: FILM.inkSoft, marginTop: 12, lineHeight: 1.4,
        }}>{secondary}</div>
      )}
    </div>
  );
}

// ─── Background gradiente cálido animado ─────────────────────────────
function BackgroundScene() {

    <div style={{
      position: 'absolute', inset: 0,
      background: `radial-gradient(ellipse at 70% 40%, ${FILM.ivory} 0%, rgb(${r},${g},${b}) 60%, rgb(${r-5},${g-8},${b-12}) 100%)`,
    }} />
  );
}

// ─── Watermark del logo (esquina inferior izquierda) ─────────────────
function Watermark() {
  const time = useTime();
  const op = interpolate(time, [7.5, 8.5], [0, 0.35], Easing.easeOut);
  const opOut = interpolate(time, [20.8, 21.5], [0.35, 0], Easing.easeIn);
  if (time < 7.5 || time > 21.5) return null;

  return (
    <div style={{
      position: 'absolute', bottom: 32, left: 40,
      display: 'flex', alignItems: 'center', gap: 10,
      opacity: Math.min(op, opOut), pointerEvents: 'none',
    }}>
      <img src="assets/logocr.png" alt="" style={{ width: 24, height: 24, objectFit: 'contain' }} />
      <span style={{
        fontFamily: 'GoogleSans, sans-serif',
        fontSize: 13, fontWeight: 500, color: FILM.ink,
        letterSpacing: '0.05em',
      }}>My CR</span>
    </div>
  );
}

// ─── Huashu watermark (esquina inferior derecha) ─────────────────────
function HuashuWatermark() {
  return (
    <div style={{
      position: 'absolute', bottom: 24, right: 36,
      fontSize: 11, color: 'rgba(31,26,20,0.32)',
      letterSpacing: '0.15em', fontFamily: 'ui-monospace, monospace',
      pointerEvents: 'none', zIndex: 100,
    }}>
      Created by Huashu-Design
    </div>
  );
}

// ─── Phone content router según tiempo ────────────────────────────────
function PhoneContent() {
  const time = useTime();
  // Transición entre escenas con fade rápido (200ms)
  let content;
  let key = '';

  if (time < 7.0) { content = <LoginScene />; key = 'login'; }
  else if (time < 12.0) { content = <DashboardScene />; key = 'dashboard'; }
  else if (time < 17.0) { content = <PagosScene />; key = 'pagos'; }
  else { content = <ReservasScene />; key = 'reservas'; }

  return (
    <div key={key} style={{ width: '100%', height: '100%' }}>
      {content}
    </div>
  );
}

// ─── FILM ROOT ────────────────────────────────────────────────────────
function Film() {
  return (
    <Stage duration={25} width={1920} height={1080} bgColor={FILM.cream}>
      <BackgroundScene />

      {/* Act I: Hook (también persiste sutil al inicio del act II) */}
      <Sprite start={0} end={5.5}>
        <HookScene />
      </Sprite>

      {/* iPhone protagonista (3-22s) */}
      <PhoneStage>
        <IosFrame time="9:41" battery={92}>
          <PhoneContent />
        </IosFrame>
      </PhoneStage>

      {/* Side copies */}
      <Sprite start={8.5} end={12.0}>
        <SideCopy
          start={8.5} end={12.0}
          primary="Tu hogar,"
          secondary="organizado en un solo lugar."
        />
      </Sprite>

      <Sprite start={13.5} end={17.0}>
        <SideCopy
          start={13.5} end={17.0}
          primary="Paga tu cuota"
          secondary="sin filas, sin bancos, en segundos."
        />
      </Sprite>

      <Sprite start={17.5} end={21.0}>
        <SideCopy
          start={17.5} end={21.0}
          primary="Reserva el salón"
          secondary="con un solo toque."
        />
      </Sprite>

      {/* Watermarks */}
      <Watermark />

      {/* Act V: Cierre */}
      <Sprite start={21.0} end={25.0}>
        <ClosingScene />
      </Sprite>

      <HuashuWatermark />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Film />);
</script>
</body>
</html>
